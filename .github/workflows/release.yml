name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/mk-tools

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: strip target/${{ matrix.target }}/release/mk-tools

      - name: Create tarball
        run: |
          mkdir -p dist
          BIN_NAME="mk-tools"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="${BIN_NAME}-${TARGET}"

          cp "target/${TARGET}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${BIN_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mk-tools-${{ matrix.target }}
          path: dist/*.tar.gz*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release notes
        run: |
          cat << EOF > RELEASE_NOTES.md
          # mk-tools v${{ steps.version.outputs.VERSION }}

          ## Downloads

          ### Linux (x86_64)
          - [mk-tools-x86_64-unknown-linux-gnu.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mk-tools-x86_64-unknown-linux-gnu.tar.gz)

          ### macOS (ARM64)
          - [mk-tools-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mk-tools-aarch64-apple-darwin.tar.gz)

          ## Installation

          Download the appropriate archive for your platform, extract it, and move the binary to a directory in your PATH:

          \`\`\`bash
          # Linux example
          tar xzf mk-tools-x86_64-unknown-linux-gnu.tar.gz
          sudo mv mk-tools /usr/local/bin/

          # macOS example
          tar xzf mk-tools-aarch64-apple-darwin.tar.gz
          sudo mv mk-tools /usr/local/bin/
          \`\`\`

          ## Verify checksums

          SHA256 checksums are provided for each archive. Verify with:

          \`\`\`bash
          shasum -a 256 -c mk-tools-*.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
